apiVersion: edu.web3/v1
kind: PluginPackage
metadata:
  id: edu.cn.trace.medical
  name: Medical Tamper Detection Lab
  version: 0.4.0
  repo: supervision-trace-edu-suite
  compliance_tier: cn_domain

spec:
  coreVersion: ">=0.6.0 <2.0.0"
  taskTypes:
    - CN_MEDICAL_TAMPER_DEMO
  namespaces:
    - ns-domain-cn
  allowedChainIds:
    - fabric-local
  frontend:
    routePrefix: /labs/edu.cn.trace.medical
    entry: plugins/medical-tamper/frontend/plugin.ts
  rules:
    entry: plugins.rules.medical_tamper:evaluate
  k8s:
    jobTemplate: k8s/overlays/ns-domain-cn/medical-tamper-job.yaml
  docs:
    - docs/tutorials/medical-tamper-intro.md
