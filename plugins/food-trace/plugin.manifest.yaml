apiVersion: edu.web3/v1
kind: PluginPackage
metadata:
  id: edu.cn.trace.food
  name: Food Trace Simulation Lab
  version: 0.1.0
  repo: supervision-trace-edu-suite
  compliance_tier: cn_domain

spec:
  coreVersion: ">=0.1.0 <0.2.0"
  taskTypes:
    - CN_FOOD_TRACE_SIM
  namespaces:
    - ns-domain-cn
  allowedChainIds:
    - fabric-local
  frontend:
    routePrefix: /labs/edu.cn.trace.food
    entry: plugins/food-trace/frontend/plugin.ts
  rules:
    entry: plugins.rules.food_trace:evaluate
  k8s:
    jobTemplate: k8s/overlays/ns-domain-cn/food-trace-job.yaml
  docs:
    - docs/tutorials/food-trace-intro.md
