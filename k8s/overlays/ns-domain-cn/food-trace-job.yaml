apiVersion: batch/v1
kind: Job
metadata:
  name: food-trace-demo
  labels:
    edu.web3/plugin-id: edu.cn.trace.food
    edu.web3/compliance: fabric-sandbox
    edu.web3/namespace: ns-domain-cn
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        edu.web3/plugin-id: edu.cn.trace.food
    spec:
      restartPolicy: Never
      containers:
        - name: fabric-runner
          image: hyperledger/fabric-tools:2.5
          env:
            - name: CHAIN_ID
              value: "fabric-local"
            - name: FABRIC_CHANNEL
              value: "edu-cn-trace-sandbox"
            - name: FABRIC_ORG
              value: "OrgEduDemo"
            - name: CHAINCODE_PATH
              value: "plugins/food-trace/chaincode/food_trace.go"
            - name: TASK_TYPE
              value: "CN_FOOD_TRACE_SIM"
          command:
            - sh
            - -ec
            - |
              echo "==> ${TASK_TYPE} fabric-local toolchain gate"
              peer version | head -1
              configtxgen -version 2>/dev/null | head -1 || true
              case "${CHAINCODE_PATH}" in
                plugins/*/chaincode/*.go) echo "chaincode path OK: ${CHAINCODE_PATH}" ;;
                *) echo "invalid chaincode path: ${CHAINCODE_PATH}"; exit 1 ;;
              esac
              echo "channel=${FABRIC_CHANNEL} org=${FABRIC_ORG}"
              echo "fabric-sandbox gate OK — fictional food trace data only"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
